%YAML:1.0
---
video:
  source_type: mipi
  source: /dev/video0
  width: 640
  height: 480
  fps: 30
  loop: true
  realtime: true
  inference_fps: 15
  gstreamer_pipeline: ''
detector:
  model_type: yolov3
  model_dir: models/yolov3_onnx
  pre_dir: models/yolov3_onnx/preprocess
  label_file: models/yolov3_onnx/coco-labels-2014_2017.txt
  input_width: 416
  input_height: 416
  drpai_freq: 2
  conf_threshold: 0.35
  nms_threshold: 0.45
  num_class: 80
  num_bb: 3
  num_layers: 3
  grids:
    - 13
    - 26
    - 52
  anchors:
    - 10
    - 13
    - 16
    - 30
    - 33
    - 23
    - 30
    - 61
    - 62
    - 45
    - 59
    - 119
    - 116
    - 90
    - 156
    - 198
    - 373
    - 326
  class_car: 2
  class_motorbike: 3
  class_truck: 7
  class_bus: 5
  class_person: -1
  class_license_plate: -1
detector2:
  model_type: yolov8
  model_dir: models/yolov8n_bikehelmet_onnx
  pre_dir: models/yolov8n_bikehelmet_onnx/preprocess
  label_file: ''
  input_width: 640
  input_height: 640
  drpai_freq: 2
  conf_threshold: 0.35
  nms_threshold: 0.45
  num_class: 4
  num_bb: 3
  num_layers: 3
  grids:
    - 80
    - 40
    - 20
  class_car: -1
  class_motorbike: 0
  class_truck: -1
  class_bus: -1
  class_person: -1
  class_helmet: 1
  class_no_helmet: 2
  class_license_plate: 3
enable_lp_ocr: true
drpai:
  freq_index: 2
  mem_offset: 0
scene:
  stop_line:
    y1: 0.6741
    y2: 0.6941
  calibrated_for_violation: false
  lane_zones:
    line:
      x_min: 0.2629
      x_max: 0.3203
  lane_lines:
    - x_norm: 0.2853
      overlap_px: 10
  traffic_light_roi:
    x: 0.9197
    y: 0.1445
    w: 0.0258
    h: 0.124
violation:
  rules:
    helmet: true
    red_light: true
    wrong_lane: true
    lane_line: true
  cooldown_sec: 5.0
  confirm_frames: 3
output:
  mode: stream
  stream_url: rtsp://127.0.0.1:8554/cam0
  stream_width: 1280
  stream_height: 720
  stream_fps: 15
  stream_bitrate: 1500000
  save_dir: ./violations
  filename_pattern: '{plate}_{datetime}_{violation}'
  save_full_frame: true
  save_json: true
  annotated_video: ''
