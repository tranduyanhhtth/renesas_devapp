%YAML:1.0
---
video:
  source_type: "file"
  source: "CarsDrivingUnderBridge.mp4"
  width:  640
  height: 480
  fps:    20
  gstreamer_pipeline: ""

detector:
  model_type:   "yolov8"
  model_dir:    "models/yolov8n_onnx"
  pre_dir:      "models/yolov8n_onnx/preprocess"
  label_file:   "models/yolov8n_onnx/label.txt"
  input_width:  640
  input_height: 640
  drpai_freq:   2
  conf_threshold: 0.25
  nms_threshold:  0.45
  num_class:   6
  num_bb:      1
  num_layers:  3
  grids:       [80, 40, 20]
  class_car:           0
  class_motorbike:     1
  class_truck:         2
  class_bus:           3
  class_person:        4
  class_helmet:        -1
  class_license_plate: 5

detector2:
  model_type:   "yolov8"
  model_dir:    "models/yolov8n_helmet_onnx"
  pre_dir:      "models/yolov8n_helmet_onnx/preprocess"
  label_file:   "models/yolov8n_helmet_onnx/label.txt"
  input_width:  640
  input_height: 640
  drpai_freq:   2
  conf_threshold: 0.35
  nms_threshold:  0.45
  num_class:   4
  num_bb:      1
  num_layers:  3
  grids:       [80, 40, 20]
  class_car:           -1
  class_motorbike:     0
  class_truck:         -1
  class_bus:           -1
  class_person:        1
  class_helmet:        2
  class_license_plate: 3

enable_lp_ocr: 1

drpai:
  freq_index:  2
  mem_offset:  0

scene:
  stop_line:
    y1: 0.60
    y2: 0.63
  traffic_light_roi:
    x: 0.80
    y: 0.05
    w: 0.08
    h: 0.20
  lane_zones:
    motorbike: { x_min: 0.00, x_max: 0.50 }
    car:       { x_min: 0.25, x_max: 0.75 }
    truck:     { x_min: 0.25, x_max: 1.00 }
  lane_lines:
    - { x_norm: 0.33, overlap_px: 10 }
    - { x_norm: 0.66, overlap_px: 10 }

violation:
  rules:
    helmet:     0
    red_light:  1
    wrong_lane: 1
    lane_line:  1
  cooldown_sec: 5.0
  confirm_frames: 3

output:
  save_dir: "./violations"
  filename_pattern: "{plate}_{datetime}_{violation}"
  save_full_frame: 1
  save_json: 1
  annotated_video: ""
