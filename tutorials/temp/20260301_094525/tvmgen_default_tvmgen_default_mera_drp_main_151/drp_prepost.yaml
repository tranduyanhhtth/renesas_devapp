input_to_pre:
  -
    name: from_tvm_0
    order: CHW
    shape: [16,4,8400]
    type: fp16
    format: RGB

input_to_body:
  -
    name: mera_drp_151_i0
    order: HWC
    shape: [4,8400,16]
    type: fp16
    format: RGB

output_from_body:
  -
    name: conv2d_1
    order: HWC
    shape: [4,8400,1]
    type: fp16

output_from_post:
  -
    name: to_tvm_0
    order: CHW
    shape: [1,4,8400]
    type: fp16

preprocess:
  -
    src: [from_tvm_0]
    dorder_in: [CHW]
    shape_in: [[16,4,8400]]
    dtype_in: [fp16]

    dest: [mera_drp_151_i0]
    dorder_out: [HWC]
    shape_out: [[4,8400,16]]
    dtype_out: [fp16]

    operations:
    -
      op: transpose
      dorder_in: [CHW]
      shape_in: [[16,4,8400]]
      dtype_in: [fp16]

      dorder_out: [HWC]
      shape_out: [[4,8400,16]]
      dtype_out: [fp16]

      param:
        WORD_SIZE: 1
        IS_CHW2HWC: 1
postprocess:
  -
    src: [conv2d_1]
    dorder_in: [HWC]
    shape_in: [[4,8400,1]]
    dtype_in: [fp16]

    dest: [to_tvm_0]
    dorder_out: [CHW]
    shape_out: [[1,4,8400]]
    dtype_out: [fp16]

    operations:
    -
      op: transpose
      dorder_in: [HWC]
      shape_in: [[4,8400,1]]
      dtype_in: [fp16]

      dorder_out: [CHW]
      shape_out: [[1,4,8400]]
      dtype_out: [fp16]

      param:
        WORD_SIZE: 1
        IS_CHW2HWC: 0
