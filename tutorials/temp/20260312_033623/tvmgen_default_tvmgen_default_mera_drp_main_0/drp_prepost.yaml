input_to_pre:
  -
    name: from_tvm_0
    order: CHW
    shape: [3,640,640]
    type: fp32
    format: RGB

input_to_body:
  -
    name: mera_drp_0_i0
    order: HWC
    shape: [640,640,3]
    type: fp16
    format: RGB

output_from_body:
  -
    name: mul_14
    order: HWC
    shape: [160,160,32]
    type: fp16

output_from_post:
  -
    name: to_tvm_0
    order: CHW
    shape: [32,160,160]
    type: fp16

preprocess:
  -
    src: [from_tvm_0]
    dorder_in: [CHW]
    shape_in: [[3,640,640]]
    dtype_in: [fp32]

    dest: [mera_drp_0_i0]
    dorder_out: [HWC]
    shape_out: [[640,640,3]]
    dtype_out: [fp16]

    operations:
    -
      op: cast_fp16_fp32
      dorder_in: [CHW]
      shape_in: [[3,640,640]]
      dtype_in: [fp32]

      dorder_out: [CHW]
      shape_out: [[3,640,640]]
      dtype_out: [fp16]

      param:
        CAST_MODE: 1
    -
      op: transpose
      dorder_in: [CHW]
      shape_in: [[3,640,640]]
      dtype_in: [fp16]

      dorder_out: [HWC]
      shape_out: [[640,640,3]]
      dtype_out: [fp16]

      param:
        WORD_SIZE: 1
        IS_CHW2HWC: 1
postprocess:
  -
    src: [mul_14]
    dorder_in: [HWC]
    shape_in: [[160,160,32]]
    dtype_in: [fp16]

    dest: [to_tvm_0]
    dorder_out: [CHW]
    shape_out: [[32,160,160]]
    dtype_out: [fp16]

    operations:
    -
      op: transpose
      dorder_in: [HWC]
      shape_in: [[160,160,32]]
      dtype_in: [fp16]

      dorder_out: [CHW]
      shape_out: [[32,160,160]]
      dtype_out: [fp16]

      param:
        WORD_SIZE: 1
        IS_CHW2HWC: 0
