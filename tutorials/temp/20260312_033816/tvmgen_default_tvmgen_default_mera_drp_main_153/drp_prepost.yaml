input_to_pre:
  -
    name: from_tvm_0
    order: CHW
    shape: [1,2,8400]
    type: fp16
    format: RGB

  -
    name: from_tvm_1
    order: CHW
    shape: [1,2,8400]
    type: fp16
    format: RGB

input_to_body:
  -
    name: mera_drp_153_i0
    order: HWC
    shape: [2,8400,1]
    type: fp16
    format: RGB

  -
    name: mera_drp_153_i1
    order: HWC
    shape: [2,8400,1]
    type: fp16
    format: RGB

output_from_body:
  -
    name: add_0
    order: HWC
    shape: [2,8400,1]
    type: fp16

output_from_post:
  -
    name: to_tvm_0
    order: CHW
    shape: [1,2,8400]
    type: fp16

preprocess:
  -
    src: [from_tvm_0]
    dorder_in: [CHW]
    shape_in: [[1,2,8400]]
    dtype_in: [fp16]

    dest: [mera_drp_153_i0]
    dorder_out: [HWC]
    shape_out: [[2,8400,1]]
    dtype_out: [fp16]

    operations:
    -
      op: transpose
      dorder_in: [CHW]
      shape_in: [[1,2,8400]]
      dtype_in: [fp16]

      dorder_out: [HWC]
      shape_out: [[2,8400,1]]
      dtype_out: [fp16]

      param:
        WORD_SIZE: 1
        IS_CHW2HWC: 1
  -
    src: [from_tvm_1]
    dorder_in: [CHW]
    shape_in: [[1,2,8400]]
    dtype_in: [fp16]

    dest: [mera_drp_153_i1]
    dorder_out: [HWC]
    shape_out: [[2,8400,1]]
    dtype_out: [fp16]

    operations:
    -
      op: transpose
      dorder_in: [CHW]
      shape_in: [[1,2,8400]]
      dtype_in: [fp16]

      dorder_out: [HWC]
      shape_out: [[2,8400,1]]
      dtype_out: [fp16]

      param:
        WORD_SIZE: 1
        IS_CHW2HWC: 1
postprocess:
  -
    src: [add_0]
    dorder_in: [HWC]
    shape_in: [[2,8400,1]]
    dtype_in: [fp16]

    dest: [to_tvm_0]
    dorder_out: [CHW]
    shape_out: [[1,2,8400]]
    dtype_out: [fp16]

    operations:
    -
      op: transpose
      dorder_in: [HWC]
      shape_in: [[2,8400,1]]
      dtype_in: [fp16]

      dorder_out: [CHW]
      shape_out: [[1,2,8400]]
      dtype_out: [fp16]

      param:
        WORD_SIZE: 1
        IS_CHW2HWC: 0
